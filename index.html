let grid=document.getElementById("gameGrid");
games.forEach(g=>{
let div=document.createElement("div");
div.className="game-card";
div.innerHTML=`<img src="${g.img}"><p>${g.name}</p>`;
div.onclick=()=>pilihGame(div,g.name);
grid.appendChild(div);
});

function pilihGame(el,game){
selectedGame=game;
document.querySelectorAll(".game-card").forEach(e=>e.classList.remove("active"));
el.classList.add("active");

let box=document.getElementById("nominalBox");
box.innerHTML="";

dataGame[game].forEach(item=>{
let div=document.createElement("div");
div.className="nominal-item";
div.innerHTML=`${item.name}<br>Rp ${item.harga.toLocaleString()}`;

div.onclick=()=>{
document.querySelectorAll(".nominal-item").forEach(e=>e.classList.remove("active"));
div.classList.add("active");

selectedNominal=item.name;
selectedHarga=item.harga;
update();
};

box.appendChild(div);
});
}

function update(){
document.getElementById("total").innerText="Total: Rp "+selectedHarga.toLocaleString();
if(selectedGame && selectedNominal && document.getElementById("metode").value){
document.getElementById("btn").disabled=false;
}
}

document.getElementById("metode").addEventListener("change",update);

function bayar(){
let m=document.getElementById("metode").value;
if(m=="QRIS"){
document.getElementById("qrpopup").style.display="flex";
}else{
document.getElementById("danapopup").style.display="flex";
}
}

function kirimWA(){

let pesan=`RITEESHOP JB TOPUP GAME

window.open("https://wa.me/6285809805463?text="+encodeURIComponent(pesan));
